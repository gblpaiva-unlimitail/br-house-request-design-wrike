<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="u_icon.svg" />
  <link rel="shortcut icon" href="u_icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlimitail — Etapa 3</title>
  <style>
    @font-face { font-family:'Borna'; src:url('fonts/borna-regular-webfont.ttf') format('truetype'); font-weight:400; }
    @font-face { font-family:'Borna'; src:url('fonts/borna-medium-webfont.ttf') format('truetype'); font-weight:500; }
    @font-face { font-family:'Borna'; src:url('fonts/borna-semibold-webfont.ttf') format('truetype'); font-weight:600; }
    @font-face { font-family:'Borna'; src:url('fonts/borna-bold-webfont.ttf') format('truetype'); font-weight:700; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark: #001D4B;
      --blue-main: #0036FF;
      --bg: #DBE0EE;
      --white: #ffffff;
      --border: #C8CEDC;
      --red: #E53935;
    }

    html, body { font-family: 'Borna', sans-serif; background: var(--bg); }
    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .header { background: var(--blue-dark); flex-shrink: 0; }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 44px 20px;
    }
    .header-logo img { height: 20px; width: auto; display: block; }
    .header-center { text-align: center; }
    .header-center .hc-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    .header-center .hc-sub   { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.5); margin-top: 3px; }
    .header-right { display: flex; align-items: center; justify-content: flex-end; }
    .u-icon { height: 30px; width: auto; display: block; }

    .header-body { padding: 48px 44px 0; }
    .header-body h1 { font-size: 28px; font-weight: 600; color: #fff; letter-spacing: -0.02em; margin-bottom: 8px; }
    .header-body-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 64px;
    }
    .header-body-bottom p { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.5); line-height: 1.5; }

    .step-dots { display: flex; gap: 8px; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.3s; flex-shrink: 0; }
    .dot.done   { background: #22C55E; }
    .dot.active { background: #0036FF; }

    .progress-wrap { margin: 0 44px 48px; position: relative; height: 3px; background: rgba(255,255,255,0.25); }
    .progress-filled { position: absolute; left: 0; top: 0; height: 3px; background: #0036FF; width: 0%; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
    .progress-empty  { flex: 1; height: 3px; background: rgba(255,255,255,0.25); }

    /* ── FORM ── */
    .form-area { flex: 1; padding: 36px 44px 24px; }

    .section-label {
      display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
    }
    .section-label span { font-size: 13px; font-weight: 700; color: var(--blue-dark); white-space: nowrap; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 32px; }
    .field { display: flex; flex-direction: column; gap: 8px; }

    .field label { font-size: 13px; font-weight: 700; color: var(--blue-dark); }
    .field label .req { color: var(--red); margin-left: 1px; }

    .field input {
      font-family: 'Borna', sans-serif;
      font-size: 14px; font-weight: 400; color: var(--blue-dark);
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      outline: none; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: #9AA3B5; }
    .field input:focus { border-color: #0036FF; box-shadow: 0 0 0 3px rgba(0,54,255,0.1); }
    .field input.filled { border-color: #4A9FD4; }

    /* ── ACTIONS ── */
    .actions {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 44px; background: var(--bg);
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--blue-dark); color: #fff;
      font-family: 'Borna', sans-serif; font-size: 15px; font-weight: 600;
      padding: 13px 28px; border-radius: 100px;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-back:hover { background: #002a6b; }
    .btn-next {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--blue-dark); color: #fff;
      font-family: 'Borna', sans-serif; font-size: 15px; font-weight: 600;
      padding: 13px 28px; border-radius: 100px;
      border: none; cursor: pointer;
      opacity: 0.3; pointer-events: none;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-next.enabled { opacity: 1; pointer-events: all; }
    .btn-next.enabled:hover { background: #002a6b; }

    /* ── FOOTER ── */
    .footer {
      background: var(--blue-dark); padding: 32px 44px;
      display: flex; align-items: flex-end; justify-content: flex-end;
    }
    .footer-step { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.4); padding-bottom: 4px; }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-logo">
        <img src="Logo_UNLIMITAIL_BRANCA.svg" alt="unlimitail" />
      </div>
      <div class="header-center">
        <div class="hc-title">Design &amp; Conteúdo</div>
        <div class="hc-sub">Hub de solicitações</div>
      </div>
      <div class="header-right">
        <img src="u_icon.svg" alt="U" class="u-icon" />
      </div>
    </div>
    <div class="header-body">
      <h1>Abertura de briefing criativo.</h1>
      <div class="header-body-bottom">
        <p>Centralize as informações da sua solicitação<br>para garantir uma execução mais eficiente.</p>
        <div class="step-dots">
          <div class="dot done"></div>
          <div class="dot done"></div>
          <div class="dot active"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-filled" id="progressBar"></div>
      
    </div>
  </div>

  <!-- FORM -->
  <div class="form-area">
    <div class="section-label"><span>Referências e direcionamentos</span></div>
    <div class="form-grid">

      <div class="field">
        <label>Referências visuais / conteúdos<span class="req">*</span></label>
        <input type="text" id="referencias" placeholder="Links ou descrição de estilos" />
      </div>

      <div class="field">
        <label>O que não fazer<span class="req">*</span></label>
        <input type="text" id="restricoes" placeholder="Ex: Não usar cores da marca concorrente" />
      </div>

      <div class="field">
        <label>Link do briefing completo<span class="req">*</span></label>
        <input type="text" id="linkBriefing" placeholder="https://docs.google.com/..." />
      </div>

      <div class="field">
        <label>Quem aprova o material?<span class="req">*</span></label>
        <input type="text" id="aprovador" placeholder="Nome do aprovador" />
      </div>

      <div class="field">
        <label>Entrega final para:</label>
        <input type="text" id="entregaFinal" placeholder="Ex: CMO Summit, Cyril" />
      </div>

    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <a href="etapa2.html" class="btn-back">← Voltar</a>
    <button class="btn-next" id="btnNext" onclick="goNext()">Continuar →</button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-step">Etapa 3 de 4 - Referências e direcionamentos</div>
  </div>

</div>
<script>
  // obrigatórios — 4 campos, de 50% a 75% (6.25% cada)
  const required = ['referencias','restricoes','linkBriefing','aprovador'];
  const stepPct  = 25 / required.length;
  const bar      = document.getElementById('progressBar');
  const btn      = document.getElementById('btnNext');

  function update() {
    let filled = 0;
    required.forEach(id => {
      const el = document.getElementById(id);
      const ok = el.value.trim() !== '';
      el.classList.toggle('filled', ok);
      if (ok) filled++;
    });
    bar.style.width = (50 + filled * stepPct) + '%';
    btn.classList.toggle('enabled', filled === required.length);
  }

  required.forEach(id => {
    document.getElementById(id).addEventListener('input', update);
  });

  // opcional — não conta para progresso mas salva
  document.getElementById('entregaFinal').addEventListener('input', () => {
    const el = document.getElementById('entregaFinal');
    el.classList.toggle('filled', el.value.trim() !== '');
  });

  function goNext() {
    const data = {
      referencias:   document.getElementById('referencias').value.trim(),
      restricoes:    document.getElementById('restricoes').value.trim(),
      linkBriefing:  document.getElementById('linkBriefing').value.trim(),
      aprovador:     document.getElementById('aprovador').value.trim(),
      entregaFinal:  document.getElementById('entregaFinal').value.trim(),
    };
    sessionStorage.setItem('etapa3', JSON.stringify(data));
    window.location.href = 'etapa4.html';
  }

  // Restaura dados salvos
  const saved = sessionStorage.getItem('etapa3');
  if (saved) {
    const d = JSON.parse(saved);
    Object.keys(d).forEach(id => {
      const el = document.getElementById(id);
      if (el && d[id]) { el.value = d[id]; el.classList.add('filled'); }
    });
  }

  update();
</script>
</body>
</html>
